<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>HeartLink | إنشاء طلب احترافي</title>
  <meta name="description" content="أنشئ طلبك في دقائق — تجربة طلب احترافية من HeartLink" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    :root{
      --primary:#6366f1;
      --secondary:#8b5cf6;
      --accent:#06b6d4;
      --bg:#030712;
      --glass:rgba(15,23,42,.6);
      --glass-border:rgba(255,255,255,.08);
      --text:#f8fafc;
      --text-dim:#94a3b8;
      --success:#22c55e;
      --warn:#f59e0b;
      --danger:#ef4444;
    }
    .light-mode{
      --bg:#f8fafc;
      --glass:rgba(255,255,255,.82);
      --glass-border:rgba(0,0,0,.06);
      --text:#0f172a;
      --text-dim:#64748b;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Segoe UI',system-ui,sans-serif}
    body{
      background:var(--bg);
      color:var(--text);
      margin:0;
      height:100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transition:.5s cubic-bezier(.4,0,.2,1);
    }

    .bg-glow{
      position:fixed;
      width:520px;height:520px;
      background:radial-gradient(circle,var(--primary) 0%, transparent 70%);
      filter:blur(130px);
      opacity:.16;
      z-index:-1;
      animation:floating 16s infinite alternate ease-in-out;
    }
    .bg-glow.b2{
      right:-180px;bottom:-160px;
      background:radial-gradient(circle,var(--accent) 0%, transparent 70%);
      opacity:.12;
      animation-duration:18s;
    }
    @keyframes floating{
      0%{transform:translate(-20%,-20%)}
      100%{transform:translate(25%,22%)}
    }

    header{
      padding:14px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:100;
      height:90px;
      animation:fadeInDown .7s ease;
      gap:12px;
    }
    .header-tagline{
      display:flex;flex-direction:column;align-items:flex-start;gap:2px;flex:1;min-width:0
    }
    .tagline-main{
      font-size:15px;font-weight:900;white-space:nowrap;letter-spacing:.2px;color:#ffffff;
      display:flex;align-items:center;gap:8px;min-width:0
    }
    .tagline-main .pill{
      font-size:10px;font-weight:900;
      padding:6px 10px;border-radius:999px;
      background:rgba(99,102,241,.12);
      border:1px solid rgba(99,102,241,.28);
      color:var(--text);
      letter-spacing:.6px;
      flex:0 0 auto;
    }
    .tagline-main i{
      color:#ffd700;font-size:13px;
      filter:drop-shadow(0 0 6px rgba(255,215,0,.35));
      animation:crownPulse 2s infinite ease-in-out;
      flex:0 0 auto;
    }
    .tagline-sub{
      font-size:9px;color:var(--primary);font-weight:800;letter-spacing:1.6px;opacity:.85;text-transform:uppercase
    }
    @keyframes crownPulse{
      0%,100%{transform:scale(1) rotate(0deg)}
      50%{transform:scale(1.18) rotate(10deg)}
    }

    .theme-toggle{
      width:42px;height:42px;border-radius:14px;background:var(--glass);
      border:1px solid var(--glass-border);color:var(--text);cursor:pointer;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      display:flex;align-items:center;justify-content:center;transition:.25s;
      box-shadow:0 10px 28px rgba(0,0,0,.22);
      flex:0 0 auto;
    }
    .theme-toggle:active{transform:scale(.92)}

    main{
      flex:1;
      padding:0 18px;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      margin-bottom:26px;
    }

    .wrap{
      width:100%;
      max-width:520px;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .glass-card{
      width:100%;
      background:var(--glass);
      backdrop-filter:blur(42px);
      -webkit-backdrop-filter:blur(42px);
      border:1px solid var(--glass-border);
      border-radius:34px;
      box-shadow:0 28px 60px -14px rgba(0,0,0,.62);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
      max-height:calc(100dvh - 110px);
    }

    .card-top{
      padding:16px 16px 12px;
      border-bottom:1px solid var(--glass-border);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .progress-row{
      display:flex;align-items:center;justify-content:space-between;gap:10px
    }
    .step-dots{
      display:flex;align-items:center;gap:8px
    }
    .dot{
      width:9px;height:9px;border-radius:50%;
      background:rgba(148,163,184,.28);
      border:1px solid rgba(148,163,184,.18);
      transition:.25s;
    }
    .dot.active{background:rgba(99,102,241,.9);border-color:rgba(99,102,241,.5);box-shadow:0 0 0 6px rgba(99,102,241,.12)}
    .dot.done{background:rgba(34,197,94,.95);border-color:rgba(34,197,94,.55)}
    .top-actions{display:flex;align-items:center;gap:8px}
    .mini-btn{
      height:34px;border-radius:12px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--glass-border);
      color:var(--text);
      padding:0 12px;
      display:flex;align-items:center;gap:8px;
      font-weight:900;
      cursor:pointer;
      transition:.25s;
    }
    .mini-btn:active{transform:scale(.97)}
    .mini-btn.danger{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08)}
    .mini-btn.danger i{color:var(--danger)}

    .title-row h1{
      margin:0;font-size:16px;font-weight:1000;letter-spacing:.2px;
      display:flex;align-items:center;gap:10px;
    }
    .title-row h1 span{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .subtitle{margin:0;font-size:11px;color:var(--text-dim);line-height:1.55}

    .bar{
      height:10px;border-radius:999px;background:rgba(148,163,184,.16);
      overflow:hidden;border:1px solid var(--glass-border);
    }
    .bar > div{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent));
      border-radius:999px;
      transition:.35s cubic-bezier(.4,0,.2,1);
      box-shadow:0 10px 20px rgba(99,102,241,.18);
    }

    .card-body{
      padding:14px 16px 16px;
      overflow:auto;
      scrollbar-width:none;
    }
    .card-body::-webkit-scrollbar{display:none}

    .step-anim{will-change:transform, opacity}
    .animate-fast{--animate-duration:.35s}

    .grid{display:grid;grid-template-columns:1fr;gap:12px}

    .section{
      background:rgba(255,255,255,.02);
      border:1px solid var(--glass-border);
      border-radius:26px;
      padding:14px;
    }
    .section-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .section-h h2{
      margin:0;font-size:13px;font-weight:1000;letter-spacing:.2px;
      display:flex;align-items:center;gap:10px;
    }
    .section-h h2 i{
      width:34px;height:34px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(99,102,241,.12);
      border:1px solid rgba(99,102,241,.25);
      color:var(--primary);
    }
    .hint{font-size:10px;color:var(--text-dim);line-height:1.4;margin:0}

    .row{display:flex;gap:10px;flex-wrap:wrap}
    .field{flex:1 1 140px;min-width:140px}

    label{display:block;font-size:10px;color:var(--text-dim);font-weight:900;letter-spacing:.4px;margin:0 6px 6px 0}
    input, select, textarea{
      width:100%;
      background:rgba(255,255,255,.02);
      border:1px solid var(--glass-border);
      color:var(--text);
      border-radius:16px;
      padding:12px 12px;
      outline:none;
      transition:.25s;
      font-size:12px;
    }
    textarea{min-height:92px;resize:none;line-height:1.6}
    input:focus, select:focus, textarea:focus{
      border-color:rgba(99,102,241,.55);
      box-shadow:0 0 0 6px rgba(99,102,241,.12);
    }

    .chips{display:flex;flex-wrap:wrap;gap:10px}
    .chip{
      flex:1 1 130px;
      min-width:130px;
      cursor:pointer;
      user-select:none;
      border-radius:18px;
      padding:12px 12px;
      background:rgba(255,255,255,.02);
      border:1px solid var(--glass-border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      transition:.25s;
    }
    .chip .l{display:flex;align-items:center;gap:10px;min-width:0}
    .chip .ic{
      width:34px;height:34px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.03);
      border:1px solid var(--glass-border);
      color:var(--text);
      flex:0 0 auto;
    }
    .chip b{font-size:12px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chip small{display:block;font-size:9px;color:var(--text-dim);margin-top:2px}
    .chip.active{
      border-color:rgba(99,102,241,.6);
      background:rgba(99,102,241,.10);
      transform:translateY(-2px);
    }
    .chip.active .ic{background:linear-gradient(135deg,var(--primary),var(--secondary));border-color:transparent;color:#fff}
    .chip:active{transform:scale(.98)}

    .toggle{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:12px 12px;border-radius:18px;
      border:1px solid var(--glass-border);
      background:rgba(255,255,255,.02);
      cursor:pointer;
    }
    .toggle .t{display:flex;align-items:center;gap:10px}
    .toggle .t i{
      width:34px;height:34px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(6,182,212,.12);
      border:1px solid rgba(6,182,212,.25);
      color:var(--accent);
    }
    .switch{
      width:52px;height:30px;border-radius:999px;
      background:rgba(148,163,184,.20);
      border:1px solid var(--glass-border);
      position:relative;
      transition:.25s;
      flex:0 0 auto;
    }
    .switch::after{
      content:"";
      position:absolute;
      width:24px;height:24px;
      border-radius:50%;
      background:#fff;
      top:2px;
      right:2px;
      transition:.25s;
      box-shadow:0 10px 18px rgba(0,0,0,.25);
    }
    .switch.on{background:rgba(34,197,94,.35);border-color:rgba(34,197,94,.35)}
    .switch.on::after{right:26px}

    .counter{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:12px;border-radius:18px;
      border:1px solid var(--glass-border);
      background:rgba(255,255,255,.02);
    }
    .counter .c-l{display:flex;align-items:center;gap:10px}
    .counter .c-l i{
      width:34px;height:34px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(99,102,241,.12);
      border:1px solid rgba(99,102,241,.22);
      color:var(--primary);
    }
    .ctr{display:flex;align-items:center;gap:8px}
    .ctr button{
      width:34px;height:34px;border-radius:14px;
      border:1px solid var(--glass-border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      cursor:pointer;
      transition:.2s;
      font-weight:1000;
    }
    .ctr button:active{transform:scale(.95)}
    .ctr input{width:64px;text-align:center;padding:10px 8px;border-radius:14px;font-weight:1000}

    .pages-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .page-card{
      border-radius:22px;border:1px solid var(--glass-border);
      background:linear-gradient(165deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.015) 100%);
      padding:12px;overflow:hidden;
    }
    .page-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .page-head b{font-size:12px;font-weight:1000;display:flex;align-items:center;gap:10px}
    .page-head b .num{
      width:30px;height:30px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;font-weight:1000;box-shadow:0 10px 18px rgba(99,102,241,.22);
    }
    .pill{
      font-size:9px;padding:6px 10px;border-radius:999px;
      border:1px solid var(--glass-border);
      background:rgba(255,255,255,.02);
      color:var(--text-dim);
      font-weight:900;letter-spacing:.4px;white-space:nowrap;
    }
    .page-options{display:grid;grid-template-columns:1fr;gap:10px}

    .summary{
      border-radius:26px;
      border:1px dashed rgba(99,102,241,.45);
      background:rgba(99,102,241,.06);
      padding:14px;
    }
    .summary h3{margin:0 0 10px 0;font-size:12px;font-weight:1000;display:flex;align-items:center;gap:10px}
    .summary h3 i{color:var(--primary)}
    .sum-list{margin:0;padding:0 18px 0 0;font-size:11px;color:var(--text);line-height:1.7}
    .sum-list li{margin:4px 0}
    .sum-muted{color:var(--text-dim)}

    .divider{
      display:flex;align-items:center;justify-content:center;gap:10px;
      margin:10px 0 2px;
      color:var(--primary);
      font-weight:1000;letter-spacing:1px;text-transform:uppercase;font-size:10px;opacity:.95;
    }
    .divider:before,.divider:after{
      content:"";flex:1;height:1px;
      background:linear-gradient(90deg, transparent, var(--glass-border), transparent);
    }

    .footer-actions{
      padding:12px 16px 16px;
      border-top:1px solid var(--glass-border);
      display:flex;gap:10px;flex-wrap:wrap;
      background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.10) 100%);
    }
    .btn{
      flex:1 1 160px;min-width:160px;height:48px;border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      cursor:pointer;font-weight:1000;letter-spacing:.2px;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:.25s;color:#fff;text-decoration:none;
    }
    .btn:active{transform:scale(.97)}
    .btn.primary{background:linear-gradient(135deg,var(--primary),var(--secondary));box-shadow:0 14px 28px rgba(99,102,241,.22)}
    .btn.ghost{background:rgba(255,255,255,.03);border:1px solid var(--glass-border);color:var(--text)}
    .btn.success{background:linear-gradient(135deg, var(--success), #16a34a);box-shadow:0 14px 28px rgba(34,197,94,.20)}
    .btn.whatsapp{background:#25D366;box-shadow:0 14px 28px rgba(37,211,102,.18)}
    .btn.disabled{opacity:.55;pointer-events:none;filter:saturate(.6)}

    .toast{
      position:fixed;bottom:22px;left:50%;
      transform:translateX(-50%);
      padding:12px 14px;border-radius:16px;
      background:rgba(0,0,0,.55);color:#fff;
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      z-index:9999;display:none;font-size:12px;font-weight:900;
      gap:10px;align-items:center;
    }
    .toast.show{display:flex;animation:fadeInUp .25s ease}
    .toast i{color:#ffd700}

    .faq{display:flex;flex-direction:column;gap:10px}
    details{border:1px solid var(--glass-border);border-radius:18px;background:rgba(255,255,255,.02);padding:10px 12px}
    summary{cursor:pointer;font-weight:1000;font-size:12px;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:10px}
    summary::-webkit-details-marker{display:none}
    details p{margin:10px 0 0 0;font-size:11px;line-height:1.7;color:var(--text-dim)}

    .social-proof{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
    .stat{border-radius:18px;border:1px solid var(--glass-border);background:rgba(255,255,255,.02);padding:10px 10px;text-align:center}
    .stat b{display:block;font-size:13px;font-weight:1000}
    .stat span{display:block;font-size:9px;color:var(--text-dim);margin-top:2px;font-weight:900;letter-spacing:.4px}

    .success-screen{text-align:center;padding:8px 2px}
    .success-icon{
      width:84px;height:84px;border-radius:50%;
      margin:4px auto 12px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(34,197,94,.14);
      border:1px solid rgba(34,197,94,.28);
      box-shadow:0 18px 40px rgba(34,197,94,.12);
      animation:pulse 1.4s infinite ease-in-out;
    }
    .success-icon i{font-size:34px;color:var(--success)}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

    .footer-copyright-tag{
      position:fixed;bottom:8px;left:0;width:100%;
      text-align:center;font-size:9px;color:var(--text-dim);
      opacity:.55;z-index:999;pointer-events:none;letter-spacing:1px;
    }

    @keyframes fadeInDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInUp{from{opacity:0;transform:translate(-50%, 12px)}to{opacity:1;transform:translate(-50%, 0)}}

    .req{color:#ffd700;font-weight:1000}
    .error{border-color:rgba(239,68,68,.55)!important;box-shadow:0 0 0 6px rgba(239,68,68,.10)!important}
  </style>
</head>

<body>
  <div class="bg-glow"></div>
  <div class="bg-glow b2"></div>

  <header>
    <div class="header-tagline">
      <div class="tagline-main">
        <i class="fa-solid fa-crown"></i>
        HeartLink
        <span class="pill">ORDER BUILDER</span>
      </div>
      <div class="tagline-sub">Premium Experience</div>
    </div>

    <button class="theme-toggle" id="themeBtn" aria-label="Toggle Theme">
      <i id="theme-icon" class="fa-solid fa-moon"></i>
    </button>
  </header>

  <main>
    <div class="wrap">
      <div class="glass-card animate__animated animate__fadeIn">
        <div class="card-top">
          <div class="progress-row">
            <div class="step-dots" id="dots"></div>
            <div class="top-actions">
              <button class="mini-btn" id="copyBtn" title="نسخ الملخص">
                <i class="fa-solid fa-copy"></i><span>نسخ</span>
              </button>
              <button class="mini-btn danger" id="resetBtn" title="مسح الكل">
                <i class="fa-solid fa-rotate-left"></i><span>مسح</span>
              </button>
            </div>
          </div>

          <div class="title-row">
            <div>
              <h1><i class="fa-solid fa-wand-magic-sparkles"></i> إنشاء <span>طلب</span> احترافي</h1>
              <p class="subtitle">املا البيانات مرة واحدة — وفي الآخر هتطلع لك رسالة جاهزة تبعتها على الواتساب + قائمة بالحاجات اللي لازم تبعتها.</p>
            </div>
          </div>

          <div class="bar" aria-label="Progress">
            <div id="barFill"></div>
          </div>
        </div>

        <div class="card-body step-anim" id="cardBody"></div>
        <div class="footer-actions" id="footerActions"></div>
      </div>
    </div>
  </main>

  <div class="footer-copyright-tag">© 2026 HEARTLINK — ORDER EXPERIENCE</div>
  <div class="toast" id="toast"><i class="fa-solid fa-check"></i><span id="toastText">تم</span></div>

<script>
(() => {
  // ========= إعدادات =========
  const WHATSAPP_NUMBER = "201125674359";
  const STORAGE_KEY = "heartlink_order_builder_v2";
  const THEME_KEY = "heartlink_theme_mode"; // "light" | "dark"

  // ========= State =========
  const state = {
    step: 0,
    navDir: "next",
    orderId: "",
    createdAt: "",

    occasion: "",
    customIdea: "",
    receiverType: "حبيبتي/حبيبي",

    customerName: "",
    contact: "",
    password: "",
    tone: "رومانسي",
    colors: "بنفسجي/أزرق",
    delivery: "عادي",
    notes: "",

    pagesCount: 1,
    pages: [],

    includePhotos: true,
    includeVideos: true,
    includeSongs: true,
    photosCount: 10,
    videosCount: 2,
    songsCount: 1,

    globalTitle: ""
  };

  const OCCASIONS = [
    { key:"عيد ميلاد", icon:"fa-cake-candles", hint:"مفاجأة لطيفة + رسالة + ذكريات" },
    { key:"ذكرى", icon:"fa-infinity", hint:"تايم لاين + لحظاتكم المميزة" },
    { key:"صُلح", icon:"fa-heart-crack", hint:"رسالة اعتذار + صور جميلة" },
    { key:"مناسبة خاصة", icon:"fa-gift", hint:"إنت تختار السيناريو" }
  ];

  const steps = [
    { title: "اختيار المناسبة والفكرة" },
    { title: "تفاصيل التصميم والخصوصية" },
    { title: "الصفحات والمحتوى" },
    { title: "مراجعة وإرسال الطلب" }
  ];

  // ========= Utils =========
  function uid(){
    return (Math.random().toString(16).slice(2) + Date.now().toString(16)).slice(0, 18);
  }

  function ensureMeta(){
    if(!state.orderId) state.orderId = "HL-" + uid().toUpperCase().slice(0,8);
    if(!state.createdAt) state.createdAt = new Date().toISOString();
  }

  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }
  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const data = JSON.parse(raw);
      Object.assign(state, data);
    }catch(e){}
  }

  function toast(msg){
    const t = document.getElementById("toast");
    const txt = document.getElementById("toastText");
    if(!t || !txt) return;
    txt.textContent = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 1600);
  }

  // ========= Theme =========
  function applyTheme(mode){
    const isLight = mode === "light";
    document.body.classList.toggle("light-mode", isLight);
    const icon = document.getElementById("theme-icon");
    if(icon) icon.className = isLight ? "fa-solid fa-sun" : "fa-solid fa-moon";
    try{ localStorage.setItem(THEME_KEY, mode); }catch(e){}
  }
  function toggleTheme(){
    const isLight = document.body.classList.contains("light-mode");
    applyTheme(isLight ? "dark" : "light");
  }
  function initTheme(){
    try{
      const saved = localStorage.getItem(THEME_KEY);
      applyTheme(saved === "light" ? "light" : "dark");
    }catch(e){
      applyTheme("dark");
    }
  }

  // ========= Pages =========
  function makePage(i){
    return {
      id: uid(),
      title: `الصفحة ${i+1}`,
      includeIntro: i===0,
      includeMessage: true,
      includeGallery: true,
      includeVideoBlock: false,
      includeMusicBlock: false,
      messageText: "",
      galleryCount: 6,
      videoCount: 1,
      musicCount: 1
    };
  }

  function ensurePages(){
    const n = Math.max(1, Math.min(4, Number(state.pagesCount || 1)));
    state.pagesCount = n;
    if(!Array.isArray(state.pages)) state.pages = [];
    while(state.pages.length < n) state.pages.push(makePage(state.pages.length));
    if(state.pages.length > n) state.pages = state.pages.slice(0, n);
  }

  // ========= Progress UI =========
  function renderDots(){
    const el = document.getElementById("dots");
    if(!el) return;
    el.innerHTML = "";
    steps.forEach((s, i)=>{
      const d = document.createElement("div");
      d.className = "dot" + (i === state.step ? " active" : "") + (i < state.step ? " done" : "");
      d.title = s.title;
      el.appendChild(d);
    });
  }

  function setProgressBar(){
    const fill = document.getElementById("barFill");
    if(!fill) return;
    const pct = Math.round((state.step / (steps.length-1)) * 100);
    fill.style.width = pct + "%";
  }

  // ========= Animations =========
  function stepEnterAnimation(){
    const body = document.getElementById("cardBody");
    if(!body) return;
    body.classList.remove("animate__animated","animate__fadeInLeft","animate__fadeInRight","animate-fast");
    void body.offsetWidth;
    body.classList.add("animate__animated","animate-fast");
    body.classList.add(state.navDir === "next" ? "animate__fadeInRight" : "animate__fadeInLeft");
  }

  // ========= Render =========
  function render(){
    ensureMeta();
    ensurePages();
    save();
    renderDots();
    setProgressBar();

    const body = document.getElementById("cardBody");
    if(!body) return;

    body.scrollTop = 0;

    if(state.step === 0) body.innerHTML = stepOccasion();
    if(state.step === 1) body.innerHTML = stepDetails();
    if(state.step === 2) body.innerHTML = stepPages();
    if(state.step === 3) body.innerHTML = stepReview();

    renderFooter();
    wireStepEvents();
    stepEnterAnimation();
  }

  function renderFooter(){
    const f = document.getElementById("footerActions");
    if(!f) return;
    const isFirst = state.step === 0;
    const isLast = state.step === steps.length-1;

    if(!isLast){
      f.innerHTML = `
        <button class="btn ghost ${isFirst ? "disabled" : ""}" onclick="window.__HL.prevStep()">
          <i class="fa-solid fa-arrow-right"></i> رجوع
        </button>
        <button class="btn primary" onclick="window.__HL.nextStep()">
          التالي <i class="fa-solid fa-arrow-left"></i>
        </button>
      `;
    } else {
      f.innerHTML = `
        <a class="btn whatsapp" id="waBtn" href="#" target="_blank" rel="noopener">
          <i class="fa-brands fa-whatsapp"></i> افتح واتساب برسالة جاهزة
        </a>
        <button class="btn success" onclick="window.__HL.finishAndShowSuccess()">
          <i class="fa-solid fa-check-double"></i> تأكيد إنشاء الطلب
        </button>
        <button class="btn ghost" onclick="window.__HL.prevStep()">
          <i class="fa-solid fa-arrow-right"></i> تعديل
        </button>
      `;
      updateWhatsAppLink();
    }
  }

  function counterBlock(key, icon, title, min, max){
    const v = Number(state[key] ?? 0);

    return `
      <div class="page-card" data-page-index="${i}">
        <div class="page-head">
          <b><span class="num">${i+1}</span> ${escapeHtml(p.title || ("الصفحة " + (i+1)))}</b>

  // ========= Summary =========
  function renderSummaryBox(forceFull=false){
    const sum = buildSummary(forceFull);
    return `
      <div class="summary">
        <h3><i class="fa-solid fa-bolt"></i> ملخص الطلب</h3>
        <ul class="sum-list">
          ${sum.map(x=>`<li>${x}</li>`).join("")}
        </ul>
      </div>
    `;
  }

  function buildSummary(full=false){
    const lines = [];
    lines.push(`🧾 Order ID: <b>${escapeHtml(state.orderId || "—")}</b>`);

    const occ = state.occasion ? `المناسبة: <b>${escapeHtml(state.occasion)}</b>` : `<span class="sum-muted">المناسبة: لم يتم الاختيار</span>`;
    lines.push(occ);

    if(state.customIdea) lines.push(`فكرة خاصة: <b>${escapeHtml(shorten(state.customIdea, 80))}</b>`);
    else lines.push(`<span class="sum-muted">فكرة خاصة: (اختياري)</span>`);

    lines.push(`الستايل: <b>${escapeHtml(state.tone||"")}</b> — المستلم: <b>${escapeHtml(state.receiverType||"")}</b>`);

    if(full || state.step >= 1){
      lines.push(`اسمك: <b>${escapeHtml(state.customerName||"—")}</b> — تواصل: <b>${escapeHtml(state.contact||"—")}</b>`);
      lines.push(`الباسورد: <b>${escapeHtml(state.password ? "••••••" : "—")}</b>`);
      if(state.colors) lines.push(`الثيم/الألوان: <b>${escapeHtml(state.colors)}</b>`);
      lines.push(`سرعة التنفيذ: <b>${escapeHtml(state.delivery||"")}</b>`);
    }

    if(full || state.step >= 2){
      lines.push(`عدد الصفحات: <b>${state.pagesCount}</b>`);
      const g = [];
      if(state.includePhotos) g.push(`صور (${state.photosCount})`);
      if(state.includeVideos) g.push(`فيديو (${state.videosCount})`);
      if(state.includeSongs) g.push(`أغاني (${state.songsCount})`);
      lines.push(`ملفات عامة: <b>${g.length ? g.join(" • ") : "بدون"}</b>`);
      lines.push(`تفاصيل الصفحات: <b>${state.pages.map((p,i)=> pageFlagsText(p,i)).join(" | ")}</b>`);
    }

    if(full || state.step >= 1){
      if(state.notes) lines.push(`ملاحظات: <b>${escapeHtml(shorten(state.notes, 90))}</b>`);
    }
    return lines;
  }

  function pageFlagsText(p, i){
    const f = [];
    if(p.includeIntro) f.push("واجهة");
    if(p.includeMessage) f.push("رسالة");
    if(p.includeGallery) f.push(`صور(${p.galleryCount||0})`);
    if(p.includeVideoBlock) f.push(`فيديو(${p.videoCount||0})`);
    if(p.includeMusicBlock) f.push(`موسيقى(${p.musicCount||0})`);
    return `#${i+1}: ${f.length? f.join(", ") : "—"}`;
  }

  function buildAssetsChecklist(){
    const items = [];
    const photos = state.includePhotos ? (Number(state.photosCount||0)) : 0;
    const videos = state.includeVideos ? (Number(state.videosCount||0)) : 0;
    const songs  = state.includeSongs  ? (Number(state.songsCount||0))  : 0;

    if(photos>0) items.push(`📸 صور: ${photos}`);
    if(videos>0) items.push(`🎥 فيديو: ${videos}`);
    if(songs>0)  items.push(`🎵 أغاني/موسيقى: ${songs}`);

    const pageNotes = [];
    state.pages.forEach((p,i)=>{
      const a = [];
      if(p.includeGallery && Number(p.galleryCount||0)>0) a.push(`صور(${p.galleryCount})`);
      if(p.includeVideoBlock && Number(p.videoCount||0)>0) a.push(`فيديو(${p.videoCount})`);
      if(p.includeMusicBlock && Number(p.musicCount||0)>0) a.push(`موسيقى(${p.musicCount})`);
      if(a.length) pageNotes.push(`صفحة ${i+1}: ${a.join(" / ")}`);
    });
    if(pageNotes.length) items.push(`🧩 توزيع الملفات: ${pageNotes.join(" — ")}`);
    return items;
  }

  // ========= WhatsApp =========
  function buildWhatsAppText(){
    const dt = new Date(state.createdAt || Date.now());
    const when = dt.toLocaleString("ar-EG");

    const lines = [];
    lines.push("✨ *طلب جديد من HeartLink (Order Builder)*");
    lines.push(`🧾 *Order ID:* ${state.orderId || "—"}`);
    lines.push(`🕒 *التاريخ:* ${when}`);
    lines.push("");
    lines.push(`🎉 *المناسبة:* ${state.occasion || "—"}`);
    lines.push(`👤 *المستلم:* ${state.receiverType || "—"}`);
    lines.push(`🎨 *الستايل:* ${state.tone || "—"}`);
    if(state.customIdea) lines.push(`💡 *فكرة خاصة:* ${sanitizeForWA(shorten(state.customIdea, 220))}`);
    lines.push("");
    lines.push("🔐 *الخصوصية*");
    lines.push(`• باسورد الموقع: ${state.password || "—"}`);
    if(state.colors) lines.push(`• ثيم/ألوان: ${state.colors}`);
    lines.push(`• سرعة التنفيذ: ${state.delivery || "—"}`);
    lines.push("");
    lines.push("📌 *بيانات التواصل*");
    lines.push(`• الاسم: ${state.customerName || "—"}`);
    lines.push(`• التواصل: ${state.contact || "—"}`);
    lines.push("");
    lines.push(`📄 *عدد الصفحات:* ${state.pagesCount}`);
    state.pages.forEach((p,i)=>{
      const f = [];
      if(p.includeIntro) f.push("واجهة");
      if(p.includeMessage) f.push("رسالة");
      if(p.includeGallery) f.push(`صور(${p.galleryCount||0})`);
      if(p.includeVideoBlock) f.push(`فيديو(${p.videoCount||0})`);
      if(p.includeMusicBlock) f.push(`موسيقى(${p.musicCount||0})`);
      const title = (p.title||`الصفحة ${i+1}`).trim();
      lines.push(`• صفحة ${i+1} (${title}): ${f.length?f.join(" / "):"—"}`);
      if(p.includeMessage && p.messageText){
        lines.push(`  - نص رسالة الصفحة: ${sanitizeForWA(shorten(p.messageText, 180))}`);
      }
    });

    lines.push("");
    lines.push("📦 *ملفات هتبعتها*");
    const checklist = buildAssetsChecklist();
    if(checklist.length) checklist.forEach(x=>lines.push("• " + sanitizeForWA(x)));
    else lines.push("• لا يوجد ملفات.");

    if(state.notes){
      lines.push("");
      lines.push("📝 *ملاحظات إضافية*");
      lines.push(sanitizeForWA(shorten(state.notes, 260)));
    }

    lines.push("");
    lines.push("✅ *جاهز أبعت الملفات بعد ما تقولّي الترتيب المطلوب*");
    return lines.join("\n");
  }

  function updateWhatsAppLink(){

    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
    const wa = document.getElementById("waBtn");

  function resetAll(){
    try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
    Object.keys(state).forEach(k=>delete state[k]);
    Object.assign(state, {
      step:0, navDir:"next", orderId:"", createdAt:"",
      occasion:"", customIdea:"", receiverType:"حبيبتي/حبيبي",
      customerName:"", contact:"", password:"",
      tone:"رومانسي", colors:"بنفسجي/أزرق", delivery:"عادي", notes:"",
      pagesCount:1, pages:[],
      includePhotos:true, includeVideos:true, includeSongs:true,
      photosCount:10, videosCount:2, songsCount:1,
      globalTitle:""
    });
    ensurePages();
    ensureMeta();
    save();
    toast("تم المسح");
    render();
  }

  function resetToNew(){
    state.step = 0;
    state.navDir = "next";
    render();
  }

  // ========= Navigation + Validation =========
  function prevStep(){
    state.navDir = "prev";
    state.step = Math.max(0, state.step - 1);
    render();
  }

  function nextStep(){
    const ok = validateStep(state.step);
    if(!ok) return;
    state.navDir = "next";
    state.step = Math.min(steps.length-1, state.step + 1);
    render();
  }

  function validateStep(step){
    clearErrors();

    if(step === 0){
      if(!state.occasion){
        toast("اختار المناسبة الأول");
        const occWrap = document.getElementById("occasionChips");
        if(occWrap) occWrap.scrollIntoView({behavior:"smooth", block:"center"});
        return false;
      }
      return true;
    }

    if(step === 1){
      let ok = true;
      ok = req("customerName") && ok;
      ok = req("contact") && ok;
      ok = req("password") && ok;
      if(!ok) toast("كمّل البيانات المطلوبة");
      return ok;
    }

    if(step === 2){
      if(state.pagesCount < 1 || state.pagesCount > 4){
        toast("اختار عدد صفحات صحيح");
        return false;
      }
      return true;
    }

    return true;
  }

  function req(id){
    const v = (state[id]||"").trim();
    const el = document.getElementById(id);
    if(!v){
      if(el) el.classList.add("err
